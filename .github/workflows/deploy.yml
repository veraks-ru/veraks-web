name: CI + build (veraks-web)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch: {}

env:
  WEB_IMAGE: avvolob/veraks-web
  MOCK_IMAGE: avvolob/veraks-mock-esia
  # Публичные URL фронта — вшиваются в бандл на сборке образа.
  NEXT_PUBLIC_API_BASE: https://api.veraks.ru
  NEXT_PUBLIC_GOCTOPUS_URL: wss://veraks.ru/ws

jobs:
  build-check:
    name: next build (typecheck)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - name: next build
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: ${{ env.NEXT_PUBLIC_API_BASE }}
          NEXT_PUBLIC_GOCTOPUS_URL: ${{ env.NEXT_PUBLIC_GOCTOPUS_URL }}

  build:
    name: Build & push images
    needs: build-check
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
      - id: sha
        run: echo "sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Frontend image (публичные URL вшиваются здесь)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            NEXT_PUBLIC_API_BASE=${{ env.NEXT_PUBLIC_API_BASE }}
            NEXT_PUBLIC_GOCTOPUS_URL=${{ env.NEXT_PUBLIC_GOCTOPUS_URL }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ steps.sha.outputs.sha }}
            ${{ env.WEB_IMAGE }}:latest

      - name: Mock-ЕСИА image
        uses: docker/build-push-action@v5
        with:
          context: dev/mock-esia
          push: true
          tags: |
            ${{ env.MOCK_IMAGE }}:${{ steps.sha.outputs.sha }}
            ${{ env.MOCK_IMAGE }}:latest
